<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Multi-Asset Lot Size Calculator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --success: #10b981;
            --border: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }
        h2 { margin-top: 0; text-align: center; color: var(--primary); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 16px; }
        .form-group.full { grid-column: span 2; }
        label { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
        input, select {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        input:focus, select:focus { border-color: var(--primary); }
        .hidden { display: none !important; }
        .results {
            background-color: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--primary);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }
        .lot-display { font-size: 36px; font-weight: 800; color: var(--success); margin: 10px 0; }
        .exact-lot { font-size: 13px; color: var(--text-muted); margin-top: -5px; margin-bottom: 15px; }
        .sub-results { display: flex; justify-content: space-around; font-size: 14px; color: var(--text-muted); margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px;}
    </style>
</head>
<body>

<div class="container">
    <h2>Risk & Lot Size Calculator</h2>
    
    <div class="grid">
        <div class="form-group full">
            <label>Account Balance ($)</label>
            <input type="number" id="balance" value="10000" step="any">
        </div>
        
        <div class="form-group">
            <label>Asset Type</label>
            <select id="assetType">
                <option value="forex">Forex (Standard)</option>
                <option value="jpy">Forex (JPY Pairs)</option>
                <option value="gold">Gold (XAU - 10 pips = $1)</option>
                <option value="silver">Silver (XAG - 100 pips = $1)</option>
                <option value="oil">Crude Oil (100 pips = $1)</option>
                <option value="nasdaq">Nasdaq (10 pips = $1)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Contract Size</label>
            <input type="number" id="contractSize" value="100000">
        </div>

        <div class="form-group">
            <label>Risk Type</label>
            <select id="riskType">
                <option value="percent">% of Account</option>
                <option value="fixed">Fixed Cash Amount</option>
            </select>
        </div>
        <div class="form-group">
            <label id="riskValueLabel">Risk (%)</label>
            <input type="number" id="riskValue" value="1" step="any">
        </div>

        <div class="form-group full">
            <label>Stop Loss Input Method</label>
            <select id="slMethod">
                <option value="pips">Distance in Pips / Points</option>
                <option value="prices">Entry & SL Prices</option>
            </select>
        </div>

        <div class="form-group full" id="pipsGroup">
            <label id="distanceLabel">Stop Loss (Pips)</label>
            <input type="number" id="slDistance" value="50">
        </div>

        <div class="form-group" id="entryGroup" class="hidden" style="display:none;">
            <label>Entry Price</label>
            <input type="number" id="entryPrice" value="1.1000" step="any">
        </div>
        <div class="form-group" id="slPriceGroup" class="hidden" style="display:none;">
            <label>Stop Loss Price</label>
            <input type="number" id="slPrice" value="1.0950" step="any">
        </div>
    </div>

    <div class="results">
        <div>RECOMMENDED LOT SIZE</div>
        <div class="lot-display" id="outputLotSize">0.20</div>
        <div class="exact-lot">Exact: <span id="outputExactLotSize">0.2</span></div>
        <div class="sub-results">
            <div>Cash Risk: <span id="outputRiskCash">$100.00</span></div>
            <div>Price Distance: <span id="outputDistance">0.0050</span></div>
        </div>
    </div>
</div>

<script>
    const presets = {
        forex: { contract: 100000, mult: 0.0001, label: "Pips", entry: 1.1000, sl: 1.0950 },
        jpy: { contract: 100000, mult: 0.01, label: "Pips", entry: 155.00, sl: 154.50 },
        gold: { contract: 100, mult: 0.10, label: "Pips (10 pips = $1)", entry: 2300, sl: 2290 },
        silver: { contract: 5000, mult: 0.01, label: "Pips (100 pips = $1)", entry: 28.00, sl: 27.50 },
        oil: { contract: 1000, mult: 0.01, label: "Pips (100 pips = $1)", entry: 80.00, sl: 79.00 },
        nasdaq: { contract: 1, mult: 0.10, label: "Pips (10 pips = $1)", entry: 18000, sl: 17950 }
    };

    const elements = ['balance', 'assetType', 'contractSize', 'riskType', 'riskValue', 'riskValueLabel', 'slMethod', 'pipsGroup', 'distanceLabel', 'slDistance', 'entryGroup', 'slPriceGroup', 'entryPrice', 'slPrice', 'outputLotSize', 'outputExactLotSize', 'outputRiskCash', 'outputDistance'];
    const el = {};
    elements.forEach(id => el[id] = document.getElementById(id));

    function updateAssetPreset() {
        const asset = presets[el.assetType.value];
        el.contractSize.value = asset.contract;
        el.distanceLabel.textContent = `Stop Loss (${asset.label})`;
        el.entryPrice.value = asset.entry;
        el.slPrice.value = asset.sl;
        calculate();
    }

    function toggleFields() {
        // Dynamically change the Risk Label based on selection
        if (el.riskType.value === 'percent') {
            el.riskValueLabel.textContent = "Risk (%)";
        } else {
            el.riskValueLabel.textContent = "Risk ($)";
        }

        if (el.slMethod.value === 'pips') {
            el.pipsGroup.style.display = 'block';
            el.entryGroup.style.display = 'none';
            el.slPriceGroup.style.display = 'none';
        } else {
            el.pipsGroup.style.display = 'none';
            el.entryGroup.style.display = 'block';
            el.slPriceGroup.style.display = 'block';
        }
        calculate();
    }

    function calculate() {
        const balance = parseFloat(el.balance.value) || 0;
        const contractSize = parseFloat(el.contractSize.value) || 0;
        const riskValue = parseFloat(el.riskValue.value) || 0;
        const asset = presets[el.assetType.value];

        let riskCash = el.riskType.value === 'percent' ? balance * (riskValue / 100) : riskValue;
        
        let priceDistance = 0;
        if (el.slMethod.value === 'pips') {
            const pips = parseFloat(el.slDistance.value) || 0;
            priceDistance = pips * asset.mult;
        } else {
            const entry = parseFloat(el.entryPrice.value) || 0;
            const sl = parseFloat(el.slPrice.value) || 0;
            priceDistance = Math.abs(entry - sl);
        }

        let lotSize = 0;
        if (priceDistance > 0 && contractSize > 0) {
            lotSize = riskCash / (priceDistance * contractSize);
        }

        el.outputLotSize.textContent = isFinite(lotSize) && lotSize > 0 ? lotSize.toFixed(2) : "0.00";
        el.outputExactLotSize.textContent = isFinite(lotSize) && lotSize > 0 ? lotSize : "0";
        el.outputRiskCash.textContent = `$${riskCash.toFixed(2)}`;
        el.outputDistance.textContent = priceDistance.toFixed(4);
    }

    el.assetType.addEventListener('change', updateAssetPreset);
    [el.riskType, el.slMethod].forEach(item => item.addEventListener('change', toggleFields));
    document.querySelectorAll('input').forEach(input => input.addEventListener('input', calculate));

    calculate();
</script>

</body>
</html>
